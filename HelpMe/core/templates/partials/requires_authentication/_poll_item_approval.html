{% load static %}
{% csrf_token %}
<div class="flex items-center gap-2 js-approval-container w-full" data-item-id="{{ item.pollitem_id }}">
    {% if item.approval_status == 'NEUTRAL' %}
        <c-button type="button"
                  variant="outline"
                  class="flex-1 js-suggestion-action transition-all"
                  data-action="approve">
            <i data-lucide="thumbs-up" class="w-4 h-4"></i>
        </c-button>

        <c-button type="button"
                  variant="outline"
                  class="flex-1 js-suggestion-action transition-all"
                  data-action="decline">
            <i data-lucide="thumbs-down" class="w-4 h-4"></i>
        </c-button>
    {% else %}
        <div class="flex-1 text-center py-2 opacity-40">
            <span class="text-sm font-semibold">
                {{ item.get_approval_status_display }}
            </span>
        </div>
    {% endif %}
</div>
