{% load static %}
<c-popover side="bottom" align="end" sideOffset="12">
    <c-popover.trigger>
        <button class="relative flex h-12 w-12 shrink-0 overflow-hidden rounded-full border hover:opacity-80 transition-all">
            <div class="flex h-full w-full items-center justify-center bg-muted">
                <img src="{{ user.picture.url }}" alt="{{ user.username }}" class="w-full h-full object-cover">
            </div>
        </button>
    </c-popover.trigger>

    <c-popover.content class="rounded-popover fixed-popover glass-panel">
        <div class="space-y-4">
            <div class="px-1 text-left">
                <p class="text-lg font-bold leading-tight">{{ user.full_name|default:"Unknown User" }}</p>
                <div class="flex items-center justify-between gap-4 mt-1">
                    <p class="text-sm opacity-60">@{{ user.username }}</p>
                    <span class="text-xs font-bold px-2 py-1 border rounded-md opacity-80">{{ user.get_type_display }}</span>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <a href="{% url 'HelpMe_app:my_account' %}">
                    <c-button variant="outline" class="w-full justify-start border-none px-2">
                        <i data-lucide="user-round"></i>My account
                    </c-button>
                </a>
                <a href="{% url 'HelpMe_app:change_password' %}">
                    <c-button variant="outline" class="w-full justify-start border-none px-2">
                        <i data-lucide="key-round"></i> Change
                        password
                    </c-button>
                </a>
                <form action="{% url 'HelpMe_app:logout' %}" method="post" class="w-full mt-2">
                    {% csrf_token %}
                    <c-button type="submit"
                              class="destructive-btn-rev w-full justify-start border-none px-2">
                        <i data-lucide="log-out"></i> Sign out
                    </c-button>
                </form>
            </div>
        </div>
    </c-popover.content>
</c-popover>
