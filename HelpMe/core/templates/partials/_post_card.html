{% load static %}

<c-card class="glass-panel relative group flex flex-col border rounded-[24px] p-6 shadow-sm hover:shadow-md transition-all duration-200">

    <a href="{% url 'HelpMe_app:post_overview' question.questionID %}" class="absolute inset-0 z-0">
        <span class="sr-only">View {{ question.title }}</span>
    </a>

    <div class="flex-1 z-10 pointer-events-none">
        <h3 class="text-lg font-bold leading-snug mb-2 group-hover:underline underline-offset-4 decoration-1">
            {{ question.title }}
        </h3>
        <p class="text-sm opacity-70 line-clamp-3 mb-6">
            {{ question.description }}
        </p>
    </div>

    <div class="flex items-center justify-between pt-4 border-t z-10">
        <div class="flex items-center gap-2">
            <img src="{% if 'default.png' in question.username.picture.url %}{% static 'images/profilepic_default_temp.png' %}{% else %}{{ question.username.picture.url }}{% endif %}"
                 class="w-6 h-6 rounded-full object-cover border"
                 alt="{{ question.username.username }}">
            <span class="opacity-60 font-semibold text-xs">{{ question.username.username }}</span>
        </div>

        <div class="flex items-center gap-2">
            <c-button variant="outline" class="flex gap-2 items-center">
                <i data-lucide="heart"
                   class="w-4 h-4 {% if user in question.liked_by.all %}fill-red-500 text-red-500{% endif %}">
                </i>
                <span class="font-medium">{{ question.liked_by.count }}</span>
            </c-button>
        </div>
    </div>

</c-card>
