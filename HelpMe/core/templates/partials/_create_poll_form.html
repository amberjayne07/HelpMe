{% load static %}

<div class="space-y-6">
    <div class="space-y-4">
        <div class="text-sm font-bold uppercase tracking-wider opacity-40">Poll Question</div>

        <div class="space-y-3">
            <div class="flex items-center space-x-3">
                <input type="radio" name="poll_title_type" id="same_title" class="w-4 h-4 cursor-pointer" checked>
                <label for="same_title" class="text-sm cursor-pointer opacity-60">Same as issue title</label>
            </div>

            <div class="flex items-center space-x-3">
                <input type="radio" name="poll_type" id="custom_title" class="w-4 h-4 cursor-pointer">
                <label for="custom_title" class="text-sm cursor-pointer opacity-60">Custom question title</label>
            </div>
        </div>
    </div>

    <div class="space-y-4 pt-4 border-t border-slate-200/40">
        <div class="text-sm font-bold uppercase tracking-wider opacity-40">Answers</div>

        <div class="space-y-3">
            <c-input placeholder="Option 1" />
            <c-input placeholder="Option 2" />

            <c-button variant="outline" size="sm" class="w-full border-dashed opacity-60">
                <i data-lucide="plus" class="w-3 h-3 mr-2"></i> Add option
            </c-button>
        </div>
    </div>
</div>
