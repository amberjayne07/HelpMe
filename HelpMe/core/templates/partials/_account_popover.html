{% load static %}
<c-popover side="bottom" align="end" sideOffset="12">
    <c-popover.trigger>
        <button class="relative flex h-10 w-10 shrink-0 overflow-hidden rounded-full border hover:opacity-80 transition-all">
            <div class="flex h-full w-full items-center justify-center bg-muted">
                <img src="{% if user.picture %}{{ user.picture.url }}{% else %}{% static 'images/profilepic_default_temp.png' %}{% endif %}"
                     alt="{{ user.username }}" class="w-full h-full object-cover">
            </div>
        </button>
    </c-popover.trigger>

    <c-popover.content class="fixed-popover glass-panel">
        <div class="space-y-4">
            <div class="px-1 text-left">
                <p class="text-lg font-bold leading-tight">{{ user.full_name|default:"Unknown User" }}</p>
                <div class="flex items-center justify-between gap-4 mt-1">
                    <p class="text-sm opacity-60">@{{ user.username }}</p>
                    <span class="text-xs font-bold px-2 py-1 border rounded-md opacity-80">{{ user.get_type_display}}</span>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <c-button variant="ghost" class="relative justify-start w-full h-11 rounded-xl">
                    <i data-lucide="user-round" class="w-4 h-4 mr-3 opacity-70"></i>
                    <span class="font-bold">My account</span>
                    <a href="{% url 'HelpMe_app:my_account' %}" class="absolute inset-0"></a>
                </c-button>

                <c-button variant="ghost" class="relative justify-start w-full h-11 rounded-xl">
                    <i data-lucide="key-round" class="w-4 h-4 mr-3 opacity-70"></i>
                    <span class="font-bold">Change password</span>
                    <a href="{% url 'HelpMe_app:change_password' %}" class="absolute inset-0"></a>
                </c-button>

                <form action="{% url 'HelpMe_app:logout' %}" method="post" class="w-full mt-1">
                    {% csrf_token %}
                    <c-button type="submit" variant="ghost"
                              class="justify-start w-full h-11 rounded-xl destructive-btn">
                        <i data-lucide="log-out" class="w-4 h-4 mr-3"></i>
                        <span class="font-bold">Sign out</span>
                    </c-button>
                </form>
            </div>
        </div>
    </c-popover.content>
</c-popover>
