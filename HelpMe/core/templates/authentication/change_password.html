{% extends "base.html" %}

{% block title_block %}Change your password{% endblock %}

{% block content_block %}
    <section class="mx-auto min-h-[70vh] flex items-center px-2 justify-center">
        <div class="w-full max-w-[600px]">
            <h1 class="text-3xl mb-6">Change your <b>password.</b></h1>
            <div class="glass-panel p-6 rounded-[32px]">
                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    {% for field in form %}
                        <c-form.field>
                            <c-form.label for="{{ field.id_for_label }}">{{ field.label }}</c-form.label>
                            <c-input
                                    id="{{ field.id_for_label }}"
                                    name="{{ field.name }}"
                                    type="password"
                                    placeholder="{{ field.label }}"
                            ></c-input>
                            {% if field.errors %}
                                <p class="text-xs mt-1 opacity-60">{{ field.errors.0 }}</p>
                            {% endif %}
                        </c-form.field>
                    {% endfor %}

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <a href="{% url 'HelpMe_app:my_account' %}" class="block w-full">
                            <c-button variant="outline" type="button" class="w-full">
                                <i data-lucide="x"></i>
                                <span>Cancel</span>
                            </c-button>
                        </a>
                        <c-button type="submit" class="w-full">
                            <i data-lucide="check"></i> Confirm
                        </c-button>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
