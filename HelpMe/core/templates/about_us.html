{% extends "base.html" %}
{% load static %}
{% block content_block %}
    <div class="px-4">
        <h1 class="text-2xl">About us.</h1>
        <div class="flex flex-row flex-wrap items-center justify-center gap-8 w-full">
            <c-card class="flex-1 min-w-[300px]">
                <c-card.header>
                    <c-card.title>We are <b>helpMe</b>.</c-card.title>
                    <c-card.description>The one place to receive clear concise advice on problems, discuss topics and
                        vote
                        on answers.
                    </c-card.description>
                </c-card.header>
                <c-card.footer>
                    Created for Web Application Systems project. Group B.
                </c-card.footer>
            </c-card>
            <div class="flex-1 min-w-[300px] ">
                <img src="{% static 'images/helpme_logo.png' %}" alt="helpMe Logo" class="h-auto w-auto p-8">
            </div>
        </div>
    </div>

{% endblock %}
